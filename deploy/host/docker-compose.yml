services:
  cfls-host:
    build:
      context: ../..
      dockerfile: deploy/host/Dockerfile
    image: cfls-host:local
    container_name: cfls-host
    hostname: cfls-host
    restart: unless-stopped
    environment:
      # Keep this stable after the first start. It becomes part of every
      # session identity and of the persisted host-admin configuration.
      CFLS_TEAM_ID: ${CFLS_TEAM_ID:-cyberkunju-cfls}
      # The host image deliberately excludes .git. These values form the
      # documented manual session identity used by the CLI at runtime.
      CFLS_REPO_ID: ${CFLS_REPO_ID:-github.com/greninja-op/CFLS-Collaborative-File-Lock-Sync}
      CFLS_BRANCH: ${CFLS_BRANCH:-main}
      # Set this in deploy/host/.env to the exact commit that teammates use.
      # Session identity intentionally includes the base revision.
      CFLS_BASE_REVISION: ${CFLS_BASE_REVISION:?Set CFLS_BASE_REVISION in deploy/host/.env}
      CFLS_BIND_URL: wss://0.0.0.0:8730
      CFLS_DB_PATH: /var/lib/cfls/data/host.db
      # Optional bearer credential for the hosted, metadata-only MCP endpoint.
      # Leave empty to keep /mcp disabled; set a high-entropy value in the
      # server-only deploy/host/.env file to enable it.
      CFLS_REMOTE_MCP_TOKEN: ${CFLS_REMOTE_MCP_TOKEN:-}
      # Returned in MCP connection metadata; clients connect to Nginx/TLS, not
      # the container's loopback listener.
      CFLS_PUBLIC_RELAY_URL: ${CFLS_PUBLIC_RELAY_URL:-wss://sync.cfls.cyberkunju.com}
      # The dashboard reveals collaboration metadata. Keep it disabled until
      # an authenticated admin route is deliberately configured.
      CFLS_DASHBOARD: "false"
      # This public relay is intentionally used for a short-code product demo.
      # It must remain false/absent for any production deployment.
      CFLS_DEMO_OPEN_PAIRING: ${CFLS_DEMO_OPEN_PAIRING:-false}
    volumes:
      # Contains the durable SQLite store and encrypted admin-key fallback.
      - cfls-data:/var/lib/cfls
    ports:
      # Nginx on the host is the only intended public entrypoint.
      - "127.0.0.1:8730:8730"
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          NODE_TLS_REJECT_UNAUTHORIZED=0 node -e
          "fetch('https://127.0.0.1:8730/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  cfls-data:
