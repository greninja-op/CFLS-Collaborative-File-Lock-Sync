# Public CFLS product site. The collaboration endpoint is intentionally kept
# on sync.cfls.cyberkunju.com so this hostname never exposes coordination APIs.

server {
    listen 80;
    listen [::]:80;
    server_name cfls.cyberkunju.com;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name cfls.cyberkunju.com;

    ssl_certificate /etc/letsencrypt/live/cfls.cyberkunju.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cfls.cyberkunju.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/cfls;
    index index.html;

    location / { try_files $uri $uri/ =404; }
}
