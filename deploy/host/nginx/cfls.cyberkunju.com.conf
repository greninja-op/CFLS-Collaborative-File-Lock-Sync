# Install only after cfls.cyberkunju.com resolves to this server and the
# matching certificate has been issued by Certbot.  The CFLS container remains
# loopback-only; Nginx is the public TLS/WSS boundary.

server {
    listen 80;
    listen [::]:80;
    server_name cfls.cyberkunju.com;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name cfls.cyberkunju.com;

    ssl_certificate /etc/letsencrypt/live/cfls.cyberkunju.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cfls.cyberkunju.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass https://127.0.0.1:8730;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        # The upstream is a self-signed TLS listener bound only to localhost.
        # External clients always receive the trusted Nginx certificate above.
        proxy_ssl_verify off;
    }
}
