# Temporary HTTP-only vhost used once to complete the Let's Encrypt HTTP-01
# challenge. Replace it with cfls.cyberkunju.com.conf immediately after the
# certificate is issued.
server {
    listen 80;
    listen [::]:80;
    server_name cfls.cyberkunju.com;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 404;
    }
}
